<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Hexagon -->
  <polygon points="12,1.5 21.5,7 21.5,17 12,22.5 2.5,17 2.5,7" fill="none" stroke="#424242" stroke-width="1"/>
  <!-- Isometric cube — top face -->
  <polygon points="12,6 17.5,9 12,12 6.5,9" fill="none" stroke="#424242" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="6.5,9 12,12 12,18 6.5,15" fill="none" stroke="#424242" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="17.5,9 12,12 12,18 17.5,15" fill="none" stroke="#424242" stroke-width="1.2" stroke-linejoin="round"/>
</svg>
